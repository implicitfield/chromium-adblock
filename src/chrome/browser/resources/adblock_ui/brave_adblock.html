<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Ad Block</title>
<meta name="color-scheme" content="light dark">
<style>
body {
  font-family: system-ui, sans-serif;
  text-align: center;
}
h3 {
    padding: 0;
    margin: 0.75rem;
}
table {
    width: 100%;
}
table, th, tr, td {
    border-spacing: 5px;
    border: solid light-dark(rgb(0 0 0), rgb(255 255 255)) 2px;
    text-align: left;
}
td {
    max-width: 1rem;
}
.box {
    min-width: 20rem;
    margin: 1rem;
    padding: 0.5rem;
    outline: solid light-dark(rgb(0 0 0), rgb(255 255 255)) 2px;
}
button {
    padding: 0;
    display: block;
    border: none;
    width: 100%;
    height: 100%;
    background-color: light-dark(lightgrey, grey);
}
button:hover {
    background-color: light-dark(darkgrey, dimgrey);
}
button:active {
    background-color: light-dark(gray, #4f4f4f);
}
.apply {
    height: 3rem;
}
.plus {
    width: 1rem;
    height: 1rem;
}
textarea {
    width: 100%;
    height: 100%;
    min-height: 6rem;
    box-sizing: border-box;
}
td > textarea {
    min-height: 0px;
    height: 3rem;
}
.remove {
    height: 3rem;
}
</style>
</head>
<body>
<div id="root"></div>
  <div id='adblockPage'>
    <div class="box">
      <h3>Subscriptions (URLs)</h3>
      <table id='subscriptions'>
          <tr>
              <th class="plus"></th>
              <th>URL</th>
              <th>Last attempted update</th>
              <th>Last updated</th>
              <th>Controls</th>
          </tr>
      </table>
    </div>
    <div class="box">
      <textarea id='newSubscription' placeholder="https://example.com/subscription"></textarea>
      <button class="apply" id="applySub">Add new subscription</button>
    </div>
    <div class="box">
      <h3>Custom Filters</h3>
      <textarea id='customFilters'></textarea>
      <button class="apply" id="applyFilters">Save filters</button>
    </div>
    <div class="box">
      <h3>Scriptlets</h3>
      <table id='customScriptlets'>
          <tr>
              <th class="plus"></th>
              <th>Name</th>
              <th>Base64</th>
          </tr>
      </table>
    </div>
    <div class="box">
        <input type="file" id="files" multiple webkitdirectory style="margin-bottom: 0.5rem;"/>
        <button class="apply" id="importButton">Import scriptlets</button>
    </div>
  </div>
<script type="module" src="brave_adblock.js"></script>
</body>
</html>
